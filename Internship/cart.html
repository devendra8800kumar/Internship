
<!DOCTYPE html>
<html>
<head>

<title>Cart</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
}

nav{
background:#333;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

h1,h2{
text-align:center;
}

#cartItems{
width:60%;
margin:20px auto;
}

.item{
background:white;
border:1px solid #ccc;
padding:10px;
margin-bottom:10px;
}

.summary{
width:300px;
margin:20px auto;
background:white;
border:1px solid #ccc;
padding:15px;
text-align:center;
}

</style>

</head>

<body>

<nav>

<h2>My Store</h2>

<div>
<a href="index.html">Products</a>
<a href="cart.html">Cart</a>
</div>

</nav>

<h1>Cart Items</h1>

<div id="cartItems"></div>

<div class="summary">

<h2>Bill Summary</h2>

<p>Total Items: <span id="items"></span></p>

<p>Total Amount: ₹<span id="total"></span></p>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let cartDiv=document.getElementById("cartItems");

let total=0;

cart.forEach(item=>{

total+=item.price;

let div=document.createElement("div");

div.className="item";

div.innerHTML=`
<h3>${item.title}</h3>
<p>₹${item.price}</p>
`;

cartDiv.appendChild(div);

});

document.getElementById("items").innerText=cart.length;

document.getElementById("total").innerText=total;

</script>

</body>
</html>
