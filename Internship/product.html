<!DOCTYPE html>
<html>
<head>

<title>Product</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
}

nav{
background:#333;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

#product{
width:400px;
margin:30px auto;
background:white;
padding:20px;
text-align:center;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:green;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

img{
width:220px;
}

</style>

</head>

<body>

<nav>

<h2>My Store</h2>

<div>
<a href="index.html">Products</a>
<a href="cart.html">Cart</a>
</div>

</nav>

<div id="product"></div>

<script>

let product=JSON.parse(localStorage.getItem("selectedProduct"));

let div=document.getElementById("product");

div.innerHTML=`
<img src="${product.thumbnail}">
<h2>${product.title}</h2>
<p>${product.description}</p>
<h3>₹${product.price}</h3>
<button onclick="addToCart()">Add To Cart</button>
`;

function addToCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push(product);

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added To Cart");

}

</script>

</body>
</html>
